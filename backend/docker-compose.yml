services:
  db:
    image: postgres:16
    container_name: hub_db
    environment:
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: hub
      POSTGRES_DB: hub_agentes
    ports:
      # Porta externa 5433 (não 5432) para não colidir com um Postgres
      # já instalado na máquina do host. Internamente o container continua
      # ouvindo 5432 — só a porta publicada no host muda.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub -d hub_agentes"]
      interval: 5s
      timeout: 5s
      retries: 5

  # UI web pra inspecionar o banco visualmente em http://localhost:8080
  # (login: sistema=PostgreSQL, servidor=db, usuario=hub, senha=hub, base=hub_agentes)
  adminer:
    image: adminer
    container_name: hub_adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
